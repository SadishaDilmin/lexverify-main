name: UK English Spell Check

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'supabase/**'
      - 'cspell.json'

jobs:
  spell-check:
    name: Enforce UK English
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Run cspell
        run: bun run spell:all
